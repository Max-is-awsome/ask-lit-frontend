<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Google Search Console verification -->
    <meta name="google-site-verification" content="RcnDXABUrYLSe0f-b_OtEkovp1t6OTGyRHNScifxwjg" />

    <title>Research Book Finder</title>

    <!-- Bootstrap 5 CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        body {
            background-color: #f8f9fa;
        }

        #maintenance-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #maintenance-box {
            background: linear-gradient(135deg, #1a0000, #3d0000);
            border: 3px solid #ff2222;
            border-radius: 16px;
            padding: 50px 60px;
            text-align: center;
            max-width: 520px;
            width: 90%;
            box-shadow: 0 0 40px rgba(255, 30, 30, 0.6), 0 0 80px rgba(255, 0, 0, 0.3);
            animation: pulse-border 2s ease-in-out infinite;
        }

        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 40px rgba(255, 30, 30, 0.6), 0 0 80px rgba(255, 0, 0, 0.3); }
            50% { box-shadow: 0 0 60px rgba(255, 30, 30, 0.9), 0 0 120px rgba(255, 0, 0, 0.5); }
        }

        #maintenance-box .icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
        }

        #maintenance-box h2 {
            color: #ff3333;
            font-size: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            text-shadow: 0 0 12px rgba(255, 50, 50, 0.8);
        }

        #maintenance-box p {
            color: #ffaaaa;
            font-size: 1.1rem;
            margin: 0;
        }

        .app-container {
            max-width: 900px;
            margin-top: 80px;
        }

        #bookList li {
            list-style: none;
            margin-bottom: 1rem;
        }

        .book-card {
            border-left: 4px solid #0d6efd;
        }
    </style>
</head>

<body>

<div id="maintenance-overlay">
    <div id="maintenance-box">
        <div class="icon">🔧</div>
        <h2>Under Maintenance</h2>
        <p>We're currently down for maintenance and will be back shortly. Thanks for your patience!</p>
    </div>
</div>

<div class="container app-container">
    <div class="text-center mb-5">
        <h1 class="fw-bold">Research Book Finder</h1>
        <p class="text-muted">
            Ask a question. We analyze it with AI and find books that actually answer it.
        </p>
    </div>

    <!-- Input Card -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <div class="input-group input-group-lg">
                <input
                    type="text"
                    id="userInput"
                    class="form-control"
                    placeholder="e.g. How does the Federal Reserve control inflation?"
                >
                <button class="btn btn-primary" onclick="sendMessage()">
                    Search
                </button>
            </div>
        </div>
    </div>

    <!-- AI Response -->
    <div id="response" class="mb-4 text-secondary"></div>

    <!-- Book Results -->
    <ul id="bookList" class="p-0"></ul>
</div>

<!-- Bootstrap JS (optional but recommended) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Your existing JS -->
<script src="script.js"></script>

</body>
</html>
